  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#0e0f13; color:#e8ecf4; padding:36px 16px 100px; -webkit-font-smoothing:antialiased; }
  .pagehead { max-width:900px; margin:0 auto 28px; }
  .pagehead h1 { font-size:22px; letter-spacing:-0.02em; }
  .pagehead p { color:#96a0b5; font-size:13.5px; margin-top:6px; line-height:1.55; }
  .pagehead code { background:#232734; padding:2px 6px; border-radius:5px; font-size:12px; }
  .cardlabel { max-width:890px; margin:30px auto 8px; font-size:12px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#7f8aa0; }
  .frame { width:890px; height:532px; margin:0 auto; overflow:hidden; border-radius:22px; box-shadow:0 20px 50px -18px rgba(0,0,0,0.6); }
  .stage { width:1270px; height:760px; transform:scale(0.70094); transform-origin:top left;
    position:relative; overflow:hidden; display:flex; align-items:center;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Helvetica,Arial,sans-serif; }
  .stage.rev { flex-direction:row-reverse; }
  .phone { flex:0 0 auto; width:560px; display:flex; align-items:center; justify-content:center;
    position:relative; z-index:2; transform:translateY(-30px); }
  .device { position:relative; padding:11px; border-radius:52px;
    background:linear-gradient(150deg,#33363f 0%,#0d0f14 52%,#242730 100%);
    -webkit-box-reflect:below 12px linear-gradient(transparent 40%, rgba(0,0,0,0.07) 66%, rgba(0,0,0,0.32)); }
  /* subtle titanium edge highlight */
  .device::after { content:""; position:absolute; inset:2px; border-radius:50px;
    box-shadow:inset 0 1.5px 2px rgba(255,255,255,0.22), inset 0 -1.5px 2px rgba(0,0,0,0.4);
    pointer-events:none; }
  /* whole phone (bezel + screenshot) tilts together as one 2D unit */
  .stage:not(.rev) .device { transform:rotate(-3deg); }
  .stage.rev .device { transform:rotate(3deg); }
  .device .screen { width:300px; height:648px; border-radius:40px; overflow:hidden; display:block;
    background:#0b0e17; box-shadow:inset 0 0 0 2px rgba(0,0,0,0.35); }
  .device .screen img { width:300px; display:block; }
  .copy { flex:1 1 auto; padding:0 96px; position:relative; z-index:2; }
  .stage.rev .copy { padding:0 96px 0 78px; }
  .wordmark { display:flex; align-items:center; gap:13px; margin-bottom:34px; }
  .wordmark .logo { width:46px; height:46px; object-fit:contain; border-radius:12px; }
  .wordmark .wm-text { font-weight:600; font-size:27px; letter-spacing:-0.02em; }
  .chip { display:inline-flex; align-items:center; gap:9px; font-size:13px; font-weight:600;
    letter-spacing:0.02em; padding:8px 15px 8px 13px; border-radius:999px; margin-bottom:26px; }
  .chip .dot { width:8px; height:8px; border-radius:50%; }
  .headline { font-size:56px; line-height:1.05; font-weight:600; letter-spacing:-0.035em; margin-bottom:22px; max-width:600px; }
  .headline .hl { color:#5B9CD8; }
  .sub { font-size:22px; line-height:1.5; font-weight:400; max-width:540px; }
  .sub b { font-weight:600; }
  /* ---- Designed app-screen mockups (crisp HTML, straight) ---- */
